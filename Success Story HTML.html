<!DOCTYPE html>

            right: 0;
            bottom: 0;

            padding: 0 1.5rem;

            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 2rem;
            margin-bottom: 3rem;

        .stat {

        }

        .stat:nth-child(1) {

        }

        .stat:nth-child(2) {

        }

        .stat:nth-child(3) {

        }

            background-clip: text;

            opacity: 0.95;
            font-weight: 500;

        .success-hero h1 {

            font-weight: 900;
            text-align: center;
            margin-bottom: 1rem;
            line-height: 1.2;

            text-align: center;
            opacity: 0.95;
            margin-bottom: 2rem;
            max-width: 700px;
            margin-left: auto;
            margin-right: auto;

            border: none;

        .cta-primary {
            background: white;
            color: #667eea;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .cta-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        }

        .cta-secondary {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 2px solid white;
            backdrop-filter: blur(10px);
        }

        .cta-secondary:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .trust-badges {

            gap: 2rem;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 2rem;
            padding-top: 2rem;
            border-top: 1px solid rgba(255, 255, 255, 0.2);

            gap: 0.5rem;

            font-size: 1.5rem;

            border-bottom: 1px solid #e5e7eb;
            position: sticky;
            top: 60px;
            z-index: 100;
            backdrop-filter: blur(10px);
            transition: box-shadow 0.3s ease;
        }

        .case-filters {

            gap: 0.75rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .filter-btn {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.75rem 1.5rem;
            background: white;
            border: 2px solid #e5e7eb;
            border-radius: 0.75rem;
            font-size: 0.95rem;
            font-weight: 600;
            color: #4b5563;
            cursor: pointer;

            border-color: transparent;

            opacity: 0.8;
        }

            background: white;

            gap: 2rem;

            overflow: hidden;

            flex-direction: column;
            opacity: 0;

            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            border-color: #667eea;
        }

        .card-ribbon {
            position: absolute;
            top: 20px;
            right: -35px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 0.5rem 2.5rem;
            font-size: 0.85rem;
            font-weight: 700;
            transform: rotate(45deg);
            z-index: 10;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            text-transform: uppercase;
        }

        .card-media {
            position: relative;
            height: 240px;
            overflow: hidden;
            background: linear-gradient(135deg, #f3f4f6 0%, #e5e7eb 100%);

        .card-media img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .success-card:hover .card-media img {
            transform: scale(1.1);

        .metric-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.8), transparent);
            padding: 1rem;
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.3s ease;
        }

        .success-card:hover .metric-overlay {
            opacity: 1;
            transform: translateY(0);
        }

        .metric-badge {
            display: inline-block;
            padding: 0.4rem 0.8rem;
            border-radius: 0.5rem;
            font-size: 0.85rem;
            font-weight: 700;
            color: white;
            backdrop-filter: blur(10px);
        }

        .metric-badge.traffic {
            background: rgba(16, 185, 129, 0.9);
        }

        .metric-badge.revenue {
            background: rgba(245, 158, 11, 0.9);
        }

        .metric-badge.ranking {
            background: rgba(102, 126, 234, 0.9);
        }

        .metric-badge.conversion {
            background: rgba(139, 92, 246, 0.9);
        }

        .metric-badge.time {
            background: rgba(107, 114, 128, 0.9);
        }

        .metric-badge.installs {
            background: rgba(59, 130, 246, 0.9);
        }

        .metric-badge.leads {
            background: rgba(236, 72, 153, 0.9);
        }

        .card-content {
            padding: 1.5rem;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .client-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1rem;
            gap: 0.75rem;
        }

        .client-header h3 {
            font-size: 1.5rem;
            font-weight: 700;
            color: #1a1a1a;
            line-height: 1.3;
            flex: 1;
        }

        .industry-tag {
            display: inline-block;
            padding: 0.35rem 0.75rem;
            background: #f9fafb;
            color: #667eea;
            border-radius: 0.5rem;
            font-size: 0.8rem;
            font-weight: 600;
            white-space: nowrap;
        }

        .metrics-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            margin-bottom: 1.5rem;
            padding: 1rem;
            background: #f9fafb;
            border-radius: 0.75rem;
        }

        .metric-item {
            text-align: center;
        }

        .metric-value {
            display: block;
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.25rem;
        }

        .metric-label {
            display: block;
            font-size: 0.75rem;
            color: #6b7280;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;

        .card-content blockquote {
            margin: 1rem 0;
            padding: 1rem;
            background: linear-gradient(135deg, #f9fafb 0%, #ffffff 100%);
            border-left: 4px solid #667eea;
            border-radius: 0.5rem;
            font-style: italic;
            color: #4b5563;
            line-height: 1.6;
        }

        .card-content blockquote p {
            margin-bottom: 0.5rem;
            font-size: 0.95rem;
        }

        .card-content cite {
            display: block;
            font-style: normal;
            font-weight: 600;
            color: #1a1a1a;
            font-size: 0.9rem;
        }

        .results-summary {
            margin: 1rem 0;
            flex: 1;
        }

        .result-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 0.75rem;
            font-size: 0.95rem;
            color: #4b5563;
        }

        .result-item .icon {
            font-size: 1.25rem;
            flex-shrink: 0;
        }

        .cta-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.75rem;
            margin-top: auto;
            padding-top: 1rem;
            border-top: 1px solid #f3f4f6;
        }

        .btn-secondary,
        .btn-primary {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.75rem 1.25rem;
            border-radius: 0.75rem;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s ease;
            font-size: 0.9rem;
            cursor: pointer;
            border: none;
        }

        .btn-secondary {
            background: white;
            color: #667eea;
            border: 2px solid #667eea;
        }

        .btn-secondary:hover {
            background: #667eea;
            color: white;
            transform: translateX(4px);
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: 2px solid transparent;
        }

        .btn-primary:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        /* Final CTA */
        .final-cta {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 4rem 0;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .final-cta::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.05'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            opacity: 0.4;
        }

        .final-cta h2 {
            font-size: 2.5rem;
            font-weight: 900;
            margin-bottom: 1rem;
            position: relative;
            z-index: 1;
        }

        .final-cta p {
            font-size: 1.125rem;
            margin-bottom: 2rem;
            opacity: 0.95;
            position: relative;
            z-index: 1;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .success-hero h1 {
                font-size: 2rem;
            }

            .hero-stats {
                grid-template-columns: repeat(2, 1fr);
            }

            .stat h2 {
                font-size: 2.5rem;
            }

            .success-grid {
                grid-template-columns: 1fr;
            }

            .cta-group {
                flex-direction: column;
            }

            .cta-btn {
                width: 100%;
            }

            .filter-section {
                top: 0;
            }

            .case-filters {
                gap: 0.5rem;
            }

            .filter-btn {
                padding: 0.6rem 1rem;
                font-size: 0.85rem;
            }

            .final-cta h2 {
                font-size: 2rem;
            }
        }
    </style>
</head>

                                </button>
                            </div>

                            <div className="trust-badges">
                                <div className="badge">
                                    <span className="badge-icon">⭐</span>
                                    <span>4.9/5 Client Rating</span>
                                </div>
                                <div className="badge">
                                    <span className="badge-icon">✓</span>
                                    <span>ISO 9001 Certified</span>
                                </div>
                                <div className="badge">
                                    <span className="badge-icon">🏆</span>
                                    <span>Google Premier Partner</span>
                                </div>
                            </div>
                        </div>
                    </section>

                    <section className="filter-section">
                        <div className="container">
                            <nav className="case-filters">
                                {filters.map(filter => (
                                    <button
                                        key={filter.id}
                                        className={`filter-btn ${activeFilter === filter.id ? 'active' : ''}`}
                                        onClick={() => setActiveFilter(filter.id)}
                                    >
                                        <span className="filter-label">{filter.label}</span>
                                        <span className="filter-count">({filter.count})</span>
                                    </button>
                                ))}
                            </nav>
                        </div>
                    </section>

                    <section className="case-studies-section">
                        <div className="container">
                            <div className="success-grid">
                                {filteredCases.map((caseStudy, index) => (
                                    <article
                                        key={caseStudy.id}
                                        className="success-card"
                                        style={{ animationDelay: `${index * 0.1}s` }}
                                    >
                                        {caseStudy.ribbon && (
                                            <div className="card-ribbon">{caseStudy.ribbon}</div>
                                        )}

                                        <div className="card-media">
                                            <div style={{
                                                width: '100%',
                                                height: '100%',
                                                background: `linear-gradient(135deg, ${index % 3 === 0 ? '#667eea' :
                                                    index % 3 === 1 ? '#10b981' : '#f59e0b'
                                                    } 0%, ${index % 3 === 0 ? '#764ba2' :
                                                        index % 3 === 1 ? '#059669' : '#d97706'
                                                    } 100%)`,
                                                display: 'flex',
                                                alignItems: 'center',
                                                justifyContent: 'center',
                                                fontSize: '3rem',
                                                opacity: 0.8
                                            }}>
                                                {index % 3 === 0 ? '📈' : index % 3 === 1 ? '🎯' : '💰'}
                                            </div>
                                            <div className="metric-overlay">
                                                {caseStudy.badges.map((badge, i) => (
                                                    <span key={i} className={`metric-badge ${caseStudy.badgeTypes[i]}`}>
                                                        {badge}
                                                    </span>
                                                ))}
                                            </div>
                                        </div>

                                        <div className="card-content">
                                            <div className="client-header">
                                                <h3>{caseStudy.name}</h3>
                                                <span className="industry-tag">{caseStudy.industry}</span>
                                            </div>

                                            <div className="metrics-row">
                                                {Object.entries(caseStudy.metrics).map(([key, value]) => (
                                                    <div key={key} className="metric-item">
                                                        <span className="metric-value">{value}</span>
                                                        <span className="metric-label">{key}</span>
                                                    </div>
                                                ))}
                                            </div>

                                            <blockquote>
                                                <p>"{caseStudy.quote}"</p>
                                                <cite>{caseStudy.author}</cite>
                                            </blockquote>

                                            <div className="results-summary">
                                                {caseStudy.results.map((result, i) => (
                                                    <div key={i} className="result-item">
                                                        <span className="icon">
                                                            {i === 0 ? '📈' : i === 1 ? '🎯' : '💰'}
                                                        </span>
                                                        <span>{result}</span>
                                                    </div>
                                                ))}
                                            </div>

                                            <div className="cta-row">
                                                <button
                                                    className="btn-secondary"
                                                    onClick={() => alert('Demo: Full case study would open here!')}
                                                >
                                                    Full Case Study →
                                                </button>
                                                <button
                                                    className="btn-primary"
                                                    onClick={() => alert('Demo: Contact form would open here!')}
                                                >
                                                    Get Similar Results
                                                </button>
                                            </div>
                                        </div>
                                    </article>
                                ))}
                            </div>
                        </div>
                    </section>

                    <section className="final-cta">
                        <div className="container">
                            <h2>Your Success Story Starts Here</h2>
                            <p>Join 127+ Chennai businesses who transformed their digital presence into measurable revenue</p>
                            <div className="cta-group">
                                <button
                                    className="cta-btn cta-primary"
                                    onClick={() => alert('Demo: Strategy session booking would open here!')}
                                >
                                    Book Free Strategy Call →
                                </button>
                                <button
                                    className="cta-btn cta-secondary"
                                    onClick={() => alert('Demo: Phone dialer would open with +91 91763 44664')}
                                >
                                    📞 Call: +91 91763 44664
                                </button>
                            </div>
                            <p style={{ marginTop: '1.5rem', fontSize: '0.95rem' }}>
                                🔒 Zero-risk guarantee: See results in 90 days or we work free until you do
                            </p>
                        </div>
                    </section>
                </>
            );
        }

        ReactDOM.render(<SuccessStoriesDemo />, document.getElementById('root'));
    </script>
</body>

</html>
