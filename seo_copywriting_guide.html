      <div class="h2">Step-by-step research process</div>

      <div class="step">
        <div class="step-num">1</div>
        <div class="step-body">
          <div class="step-title">Seed keyword discovery</div>

          <div class="step-desc">Layer on intent modifiers — "best," "how to," "for [industry]," "cost of," "vs," "near me." This reveals the full query landscape around your topic cluster.</div>

        <div class="step-num">3</div>

      <div class="step">
        <div class="step-num">5</div>

          <div class="step-title">Content gap identification</div>

      </div>
      <div class="step">
        <div class="step-num">6</div>

        <div class="card-title" style="margin-bottom:1rem;">The 7-section service page</div>

        <div class="step"><div class="step-num">1</div><div class="step-body"><div class="step-title">Problem framing</div><div class="step-desc">2–3 short paragraphs naming the specific pain points your buyer experiences. Use language from sales calls and reviews — not marketing copy.</div></div></div>

  function buildNav() {
    const nav = document.getElementById('nav');
    sections.forEach((s, i) => {
      const el = document.createElement('div');
      el.className = 'nav-item' + (i === 0 ? ' active' : '');
      el.dataset.id = s.id;
      el.innerHTML = `<span class="nav-dot"></span>${s.label}`;
      el.onclick = () => activate(s.id);
      nav.appendChild(el);
    });
  }

  function buildSections() {
    const main = document.getElementById('main-content');
    sections.forEach((s, i) => {
      const el = document.createElement('div');
      el.className = 'section' + (i === 0 ? ' active' : '');
      el.id = 'sec-' + s.id;
      el.innerHTML = `
      <div class="section-header">
        <div class="section-badge">${s.badge}</div>
        <div class="section-title">${s.title}</div>
        <div class="section-sub">${s.sub}</div>
      </div>
      ${s.content}
    `;
      main.appendChild(el);
    });
  }

  function activate(id) {
    document.querySelectorAll('.nav-item').forEach(n => n.classList.toggle('active', n.dataset.id === id));
    document.querySelectorAll('.section').forEach(s => s.classList.toggle('active', s.id === 'sec-' + id));
    if (id === 'checklist') buildChecklist();
    document.getElementById('main-content').scrollTop = 0;
  }

  function buildChecklist() {
    const container = document.getElementById('checklist-container');
    if (container.querySelector('.checklist-item')) return;
    checklistItems.forEach((item, i) => {
      const el = document.createElement('div');
      el.className = 'checklist-item';
      const box = document.createElement('div');
      box.className = 'check-box';
      box.dataset.idx = i;
      box.onclick = function () {
        this.classList.toggle('checked');
        this.textContent = this.classList.contains('checked') ? '✓' : '';
      };
      const text = document.createElement('span');
      text.textContent = item;
      el.appendChild(box);
      el.appendChild(text);
      container.appendChild(el);
    });
  }
